services:
  # FastAPI app (serves /predict and /metrics)
  api:
    build: .
    ports:
      - "8000:8000"

  # Prometheus (scrapes the API metrics)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana (dashboards; login admin / admin)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus